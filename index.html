<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정왕고 자습실 예약 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>정왕고 자습실 예약 시스템
    <button id="admin-toggle" onclick="toggleTestMode()" style="font-size: 10px; opacity: 0.3; background: none; border: 1px solid #ccc; cursor: pointer;">OFF</button>
    </h1>

    <div class="nav-tabs">
        <button class="nav-tab active" id="tab-book" onclick="goToHome()">좌석 선택하기</button>
        <button class="nav-tab" id="tab-my" onclick="showView('auth')">내 예약 확인하기</button>
    </div>

    <div id="view-step1">
        <div class="form-box">
            <label>학번</label>
            <input type="number" id="user-id" class="input-field" placeholder="ex) 10101">
            <label>이름</label>
            <input type="text" id="user-name" class="input-field" placeholder="ex) 홍길동">
        </div>
        <label style="font-size:13px; font-weight:700;">시간대 선택</label>
        <div class="slot-grid" id="slot-list"></div>
        <button class="btn-main" onclick="toStep2()">좌석 선택하러 가기</button>
    </div>

    <div id="view-step2" class="hidden">
        <div class="legend">
            <span><i class="dot" style="background:var(--success)"></i>가능</span>
            <span><i class="dot" style="background:var(--warning)"></i>선택</span>
            <span><i class="dot" style="background:var(--danger)"></i>완료</span>
        </div>
        
        <div class="map-wrapper">
            <div class="map-container" id="seat-map"></div>
        </div>

        <button class="btn-main" style="margin-top:10px;" onclick="handleReserve()">예약 확정하기</button>
        <button onclick="showView('step1')" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer; font-size:14px;">이전 단계</button>
    </div>

    <div id="view-auth" class="hidden">
        <p style="text-align:center; margin-bottom:20px; color:#666; font-size:14px;">본인 확인 정보를 입력해 주세요.</p>
        <div class="form-box">
            <label>학번</label>
            <input type="number" id="auth-id" class="input-field" placeholder="ex) 10101">
            <label>이름</label>
            <input type="text" id="auth-name" class="input-field" placeholder="ex) 홍길동">
        </div>
        <button class="btn-main" onclick="checkMyReservation()">조회하기</button>
    </div>

    <div id="view-my-list" class="hidden">
        <h3 id="my-title" style="margin-bottom:15px; font-size:16px;"></h3>
        <div id="my-contents"></div>
        <button class="btn-main" style="background:#6b7280; margin-top:20px;" onclick="showView('auth')">뒤로 가기</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
